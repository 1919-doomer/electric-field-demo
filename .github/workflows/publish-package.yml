name: Publish GitHub Package

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish-npm-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@1919-doomer'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish package
        shell: bash
        run: |
          set +e
          npm publish 2>&1 | tee publish.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -E "previously published|Cannot publish over|EPUBLISHCONFLICT|E409" publish.log; then
            echo "Package version already exists; treating this publish as successful."
            exit 0
          fi

          exit "$status"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
